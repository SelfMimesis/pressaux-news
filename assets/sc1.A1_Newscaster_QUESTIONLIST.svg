  <text class="cls-1"><tspan class="cls-2" x="0" y="50.97">1. What is the smallest thing for which you are grateful</tspan><tspan class="cls-3" x="1054.19" y="50.97">?</tspan><tspan class="cls-2" x="0" y="158.97">2. Who has had the most positive impact on your life</tspan><tspan class="cls-3" x="997.29" y="158.97">?</tspan><tspan class="cls-2" x="0" y="266.97">3. If you could use a time machine</tspan><tspan class="cls-3" x="644.88" y="266.97">,</tspan><tspan class="cls-2" x="651.09" y="266.97" xml:space="preserve"> would you rather have one that only goes back </tspan><tspan class="cls-2" x="0" y="302.97">in time or only goes forward</tspan><tspan class="cls-3" x="571.05" y="302.97">?</tspan><tspan class="cls-2" x="0" y="410.97">4. If you got a promotion</tspan><tspan class="cls-3" x="483.28" y="410.97">,</tspan><tspan class="cls-2" x="489.49" y="410.97" xml:space="preserve"> a job</tspan><tspan class="cls-3" x="595.9" y="410.97">,</tspan><tspan class="cls-2" x="602.11" y="410.97" xml:space="preserve"> a college acceptance</tspan><tspan class="cls-3" x="994.39" y="410.97">,</tspan><tspan class="cls-2" x="1000.6" y="410.97" xml:space="preserve"> an accolade</tspan><tspan class="cls-3" x="1225.28" y="410.97">/</tspan><tspan class="cls-2" x="1235.57" y="410.97">award</tspan><tspan class="cls-3" x="1340.83" y="410.97">,</tspan><tspan class="cls-2" x="1347.04" y="410.97" xml:space="preserve"> or just </tspan><tspan class="cls-2" x="0" y="446.97">generally accomplished something major</tspan><tspan class="cls-3" x="795.62" y="446.97">,</tspan><tspan class="cls-2" x="801.83" y="446.97" xml:space="preserve"> who is the first person you</tspan><tspan class="cls-3" x="1354.6" y="446.97">&apos;</tspan><tspan class="cls-2" x="1360.24" y="446.97">d tell and </tspan><tspan class="cls-2" x="0" y="482.97">how do you think they</tspan><tspan class="cls-3" x="426.53" y="482.97">&apos;</tspan><tspan class="cls-2" x="432.17" y="482.97">d react</tspan><tspan class="cls-3" x="568.55" y="482.97">?</tspan><tspan class="cls-2" x="0" y="590.97">5. If you were an inanimate object</tspan><tspan class="cls-3" x="649.01" y="590.97">,</tspan><tspan class="cls-2" x="655.22" y="590.97" xml:space="preserve"> what would you be and why</tspan><tspan class="cls-3" x="1162.56" y="590.97">?</tspan><tspan class="cls-2" x="0" y="698.97">6. Where do you wish you had grown up</tspan><tspan class="cls-3" x="721.38" y="698.97">?</tspan><tspan class="cls-2"><tspan x="0" y="806.97">7. If you could be good at any profession without having to receive the </tspan></tspan><tspan class="cls-2" x="0" y="842.97">accompanying education or trade experience</tspan><tspan class="cls-3" x="862.03" y="842.97">,</tspan><tspan class="cls-2" x="868.24" y="842.97" xml:space="preserve"> which would you choose</tspan><tspan class="cls-3" x="1323.9" y="842.97">?</tspan><tspan class="cls-2" x="0" y="950.97">8. What is something you</tspan><tspan class="cls-3" x="465.91" y="950.97">&apos;</tspan><tspan class="cls-2" x="471.55" y="950.97">re terrible at but wish you could do well</tspan><tspan class="cls-3" x="1265" y="950.97">?</tspan><tspan class="cls-2" x="0" y="1058.97">9. What is the quality you admire the most in the person you dislike the most</tspan><tspan class="cls-3" x="1513.59" y="1058.97">?</tspan><tspan class="cls-2" x="0" y="1166.97">10. What was the most recent thing that made you cry</tspan><tspan class="cls-3" x="997.53" y="1166.97">?</tspan><tspan class="cls-2" x="0" y="1274.97">11. What are the books</tspan><tspan class="cls-3" x="404.3" y="1274.97">/</tspan><tspan class="cls-2" x="414.59" y="1274.97">movies</tspan><tspan class="cls-3" x="552.46" y="1274.97">/</tspan><tspan class="cls-2" x="562.75" y="1274.97">games that never get old and always make you feel </tspan><tspan class="cls-2" x="0" y="1310.97">better when you get down</tspan><tspan class="cls-3" x="493.45" y="1310.97">?</tspan><tspan class="cls-2" x="0" y="1418.97">12. What is the most trivial thing about which you have a strong opinion</tspan><tspan class="cls-3" x="1353.43" y="1418.97">?</tspan><tspan class="cls-2" x="0" y="1526.97">13. If you could be any mythical creature</tspan><tspan class="cls-3" x="777.42" y="1526.97">,</tspan><tspan class="cls-2" x="783.63" y="1526.97" xml:space="preserve"> what would you be and why</tspan><tspan class="cls-3" x="1290.96" y="1526.97">?</tspan><tspan class="cls-2" x="0" y="1634.97">14. If you</tspan><tspan class="cls-3" x="172" y="1634.97">’</tspan><tspan class="cls-2" x="178.21" y="1634.97">ve had more than one job</tspan><tspan class="cls-3" x="662.61" y="1634.97">,</tspan><tspan class="cls-2" x="668.82" y="1634.97" xml:space="preserve"> which job taught you the most</tspan><tspan class="cls-3" x="1250.18" y="1634.97">?</tspan><tspan class="cls-2" x="0" y="1742.97">15. If you could change one thing about yourself physically</tspan><tspan class="cls-3" x="1138.12" y="1742.97">,</tspan><tspan class="cls-2" x="1144.33" y="1742.97" xml:space="preserve"> what would you change</tspan><tspan class="cls-3" x="1574.59" y="1742.97">?</tspan><tspan class="cls-2" x="1586.77" y="1742.97"> </tspan><tspan class="cls-2"><tspan x="0" y="1850.97">16. What single event or decision do you think most affected the rest of your </tspan></tspan><tspan class="cls-2" x="0" y="1886.97">life</tspan><tspan class="cls-3" x="78.93" y="1886.97">?</tspan><tspan class="cls-2" x="91.11" y="1886.97" xml:space="preserve"> Was there a turning point in your life</tspan><tspan class="cls-3" x="842.42" y="1886.97">?</tspan><tspan class="cls-2" x="0" y="1994.97">17. What is the one thing you</tspan><tspan class="cls-3" x="529.37" y="1994.97">&apos;</tspan><tspan class="cls-2" x="535" y="1994.97">ve made that you</tspan><tspan class="cls-3" x="857.18" y="1994.97">&apos;</tspan><tspan class="cls-2" x="862.82" y="1994.97">re the most proud of</tspan><tspan class="cls-3" x="1278.78" y="1994.97">?</tspan><tspan class="cls-2" x="0" y="2102.97">18. Some historical figures have epithets attached to their names</tspan><tspan class="cls-3" x="1263.52" y="2102.97">,</tspan><tspan class="cls-2" x="1269.73" y="2102.97" xml:space="preserve"> like The Mad or </tspan><tspan class="cls-2" x="0" y="2138.97">The Wise. What would you like yours to be</tspan><tspan class="cls-3" x="796.55" y="2138.97">?</tspan><tspan class="cls-2" x="0" y="2246.97">19. What was the best year of your life</tspan><tspan class="cls-3" x="729.55" y="2246.97">?</tspan><tspan class="cls-2" x="741.73" y="2246.97" xml:space="preserve"> The worst</tspan><tspan class="cls-3" x="940.04" y="2246.97">?</tspan><tspan class="cls-2" x="952.22" y="2246.97"> </tspan><tspan class="cls-2" x="0" y="2354.97">20. What one thing</tspan><tspan class="cls-3" x="331.82" y="2354.97">,</tspan><tspan class="cls-2" x="338.03" y="2354.97" xml:space="preserve"> whether it</tspan><tspan class="cls-3" x="546.15" y="2354.97">&apos;</tspan><tspan class="cls-2" x="551.79" y="2354.97">s something you did or something you made or </tspan><tspan class="cls-2" x="0" y="2390.97">something you caused to happen</tspan><tspan class="cls-3" x="621.04" y="2390.97">,</tspan><tspan class="cls-2" x="627.24" y="2390.97" xml:space="preserve"> would you like to be remembered by</tspan><tspan class="cls-3" x="1347.24" y="2390.97">?</tspan><tspan class="cls-2" x="0" y="2462.97">21. What has been the biggest change of heart you</tspan><tspan class="cls-3" x="917.37" y="2462.97">&apos;</tspan><tspan class="cls-2" x="923.01" y="2462.97">ve had</tspan><tspan class="cls-3" x="1040.61" y="2462.97">?</tspan><tspan class="cls-2" x="1052.79" y="2462.97" xml:space="preserve"> Have you ever started off </tspan><tspan class="cls-2" x="0" y="2498.97">on one side of an issue and wound up on the other</tspan><tspan class="cls-3" x="984.61" y="2498.97">?</tspan><tspan class="cls-2" x="996.79" y="2498.97" xml:space="preserve"> What influenced that change</tspan><tspan class="cls-3" x="1538.14" y="2498.97">?</tspan><tspan class="cls-2" x="0" y="2606.97">22. What is your biggest non</tspan><tspan class="cls-3" x="525.53" y="2606.97">-</tspan><tspan class="cls-2" x="534.74" y="2606.97">academic</tspan><tspan class="cls-3" x="697.1" y="2606.97">,</tspan><tspan class="cls-2" x="703.31" y="2606.97" xml:space="preserve"> non work</tspan><tspan class="cls-3" x="896.79" y="2606.97">-</tspan><tspan class="cls-2" x="906" y="2606.97">related accomplishment</tspan><tspan class="cls-3" x="1370.82" y="2606.97">?</tspan><tspan class="cls-2" x="0" y="2714.97">23. What is your biggest academic or work</tspan><tspan class="cls-3" x="781.2" y="2714.97">-</tspan><tspan class="cls-2" x="790.41" y="2714.97">related accomplishment</tspan><tspan class="cls-3" x="1255.24" y="2714.97">?</tspan><tspan class="cls-2" x="1267.42" y="2714.97"> </tspan><tspan class="cls-2" x="0" y="2822.97">24. What is something you</tspan><tspan class="cls-3" x="479.79" y="2822.97">&apos;</tspan><tspan class="cls-2" x="485.43" y="2822.97">ve done</tspan><tspan class="cls-3" x="637.51" y="2822.97">/</tspan><tspan class="cls-2" x="647.8" y="2822.97">felt</tspan><tspan class="cls-3" x="731.56" y="2822.97">/</tspan><tspan class="cls-2" x="741.85" y="2822.97">seen</tspan><tspan class="cls-3" x="836.25" y="2822.97">/</tspan><tspan class="cls-2" x="846.54" y="2822.97">etc. that you wish you could </tspan><tspan class="cls-2" x="0" y="2858.97">experience again for the first time</tspan><tspan class="cls-3" x="692.23" y="2858.97">?</tspan><tspan class="cls-2" x="0" y="2966.97">25. If you could erase one thing or event from your memory</tspan><tspan class="cls-3" x="1170.38" y="2966.97">,</tspan><tspan class="cls-2" x="1176.59" y="2966.97" xml:space="preserve"> what would you </tspan><tspan class="cls-2" x="0" y="3002.97">choose</tspan><tspan class="cls-3" x="132.86" y="3002.97">?</tspan><tspan class="cls-2"><tspan x="0" y="3074.97">26. Is there something about you that people assume because of your appearance </tspan></tspan><tspan class="cls-2" x="0" y="3110.97">or demeanour</tspan><tspan class="cls-3" x="272.9" y="3110.97">?</tspan><tspan class="cls-2" x="285.08" y="3110.97" xml:space="preserve"> What is a trait or preference you have that people don</tspan><tspan class="cls-3" x="1349.17" y="3110.97">&apos;</tspan><tspan class="cls-2" x="1354.81" y="3110.97">t expect you </tspan><tspan class="cls-2" x="0" y="3146.97">to have</tspan><tspan class="cls-3" x="137.72" y="3146.97">?</tspan><tspan class="cls-2" x="0" y="3254.97">27. If you were a character in a movie</tspan><tspan class="cls-3" x="697" y="3254.97">,</tspan><tspan class="cls-2" x="703.21" y="3254.97" xml:space="preserve"> book</tspan><tspan class="cls-3" x="811.26" y="3254.97">,</tspan><tspan class="cls-2" x="817.47" y="3254.97" xml:space="preserve"> or television show</tspan><tspan class="cls-3" x="1197.92" y="3254.97">,</tspan><tspan class="cls-2" x="1204.13" y="3254.97" xml:space="preserve"> what genre would </tspan><tspan class="cls-2" x="0" y="3290.97">you live in</tspan><tspan class="cls-3" x="212.26" y="3290.97">?</tspan><tspan class="cls-2" x="0" y="3398.97">28. What is the hardest way you</tspan><tspan class="cls-3" x="581.89" y="3398.97">’</tspan><tspan class="cls-2" x="588.1" y="3398.97">ve learned an important lesson</tspan><tspan class="cls-3" x="1210.66" y="3398.97">?</tspan><tspan class="cls-2" x="0" y="3506.97">29. What clich</tspan><tspan class="cls-3" x="233.06" y="3506.97">é</tspan><tspan class="cls-2" x="248.09" y="3506.97" xml:space="preserve"> do you think is bullshit</tspan><tspan class="cls-3" x="731.98" y="3506.97">?</tspan><tspan class="cls-2" x="744.16" y="3506.97" xml:space="preserve"> What clich</tspan><tspan class="cls-3" x="933.86" y="3506.97">é</tspan><tspan class="cls-2" x="948.89" y="3506.97" xml:space="preserve"> do you think holds truth</tspan><tspan class="cls-3" x="1451.68" y="3506.97">?</tspan><tspan class="cls-2" x="0" y="3614.97">30. What do you fear</tspan><tspan class="cls-3" x="380.01" y="3614.97">,</tspan><tspan class="cls-2" x="386.22" y="3614.97" xml:space="preserve"> despite having no real reason to do so</tspan><tspan class="cls-3" x="1155.29" y="3614.97">?</tspan><tspan class="cls-2" x="1167.47" y="3614.97" xml:space="preserve"> Basically</tspan><tspan class="cls-3" x="1351.95" y="3614.97">,</tspan><tspan class="cls-2" x="1358.16" y="3614.97" xml:space="preserve"> what is an </tspan><tspan class="cls-2" x="0" y="3650.97">irrational fear you have</tspan><tspan class="cls-3" x="474.17" y="3650.97">?</tspan><tspan class="cls-2" x="486.35" y="3650.97"> </tspan><tspan class="cls-2"><tspan x="0" y="3758.97">31. Imagine that you could choose when and how you die. At what age would you like </tspan></tspan><tspan class="cls-2" x="0" y="3794.97">to die </tspan><tspan class="cls-3" x="129.14" y="3794.97">(</tspan><tspan class="cls-2" x="137.66" y="3794.97">no maximum here</tspan><tspan class="cls-3" x="466.87" y="3794.97">)</tspan><tspan class="cls-2" x="475.39" y="3794.97" xml:space="preserve"> and how would you like to go</tspan><tspan class="cls-3" x="1042.2" y="3794.97">?</tspan><tspan class="cls-2" x="0" y="3902.97">32. What character archetype is closest to your personality</tspan><tspan class="cls-3" x="1145.8" y="3902.97">?</tspan><tspan class="cls-2" x="0" y="4010.97">33. What was the happiest moment of your life so far</tspan><tspan class="cls-3" x="1010.8" y="4010.97">?</tspan><tspan class="cls-2" x="0" y="4118.97">34. What is one childhood memory that you remember especially well</tspan><tspan class="cls-3" x="1319.59" y="4118.97">?</tspan><tspan class="cls-2" x="0" y="4226.97">35. Is there a song</tspan><tspan class="cls-3" x="345.06" y="4226.97">/</tspan><tspan class="cls-2" x="355.35" y="4226.97">movie</tspan><tspan class="cls-3" x="469.37" y="4226.97">/</tspan><tspan class="cls-2" x="479.66" y="4226.97">food</tspan><tspan class="cls-3" x="576.11" y="4226.97">/</tspan><tspan class="cls-2" x="586.4" y="4226.97">etc. that strongly reminds you of someone </tspan><tspan class="cls-2" x="0" y="4262.97">whenever you experience it</tspan><tspan class="cls-3" x="535.66" y="4262.97">?</tspan><tspan class="cls-2" x="547.84" y="4262.97" xml:space="preserve"> Who does it remind you of</tspan><tspan class="cls-3" x="1071.14" y="4262.97">?</tspan><tspan class="cls-2" x="0" y="4370.97">36. What is your ideal birthday</tspan><tspan class="cls-3" x="580.93" y="4370.97">?</tspan><tspan class="cls-2" x="593.11" y="4370.97" xml:space="preserve"> Not the date</tspan><tspan class="cls-3" x="844.15" y="4370.97">,</tspan><tspan class="cls-2" x="850.36" y="4370.97" xml:space="preserve"> but rather your ideal way to spend </tspan><tspan class="cls-2"><tspan x="0" y="4406.97">the day. </tspan></tspan><tspan class="cls-2" x="0" y="4514.97">37. Are there any smells that bring back memories for you</tspan><tspan class="cls-3" x="1128.4" y="4514.97">?</tspan><tspan class="cls-2" x="1140.58" y="4514.97" xml:space="preserve"> What are they</tspan><tspan class="cls-3" x="1403.75" y="4514.97">,</tspan><tspan class="cls-2" x="1409.96" y="4514.97" xml:space="preserve"> and what </tspan><tspan class="cls-2" x="0" y="4550.97">memories do they elicit</tspan><tspan class="cls-3" x="470.04" y="4550.97">?</tspan><tspan class="cls-2" x="482.22" y="4550.97"> </tspan><tspan class="cls-2" x="0" y="4658.97">38. What is the closest you</tspan><tspan class="cls-3" x="508.04" y="4658.97">&apos;</tspan><tspan class="cls-2" x="513.68" y="4658.97">ve ever come to dying</tspan><tspan class="cls-3" x="938.33" y="4658.97">?</tspan><tspan class="cls-2" x="0" y="4766.97">39. Do you have a personal mantra</tspan><tspan class="cls-3" x="644.41" y="4766.97">?</tspan><tspan class="cls-2" x="656.59" y="4766.97" xml:space="preserve"> If so</tspan><tspan class="cls-3" x="764.64" y="4766.97">,</tspan><tspan class="cls-2" x="770.85" y="4766.97" xml:space="preserve"> what is it</tspan><tspan class="cls-3" x="958.23" y="4766.97">?</tspan></text>
</svg>